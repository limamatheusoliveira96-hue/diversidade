/* =========================

========================= */
   /* Suas variáveis de cor */
:root {
  --fundo: #f5f0ff;
  --fundo2: #d9c8ff;
  --fundo-escuro: #1a1525; /* Essencial para o contraste punk */
}

/* 1. O FUNDO (Ocupa a tela inteira e centraliza o conteúdo) */
.grunge-bg {
  width: 100vw;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
  
  /* Gradiente Grunge Base */
  background: radial-gradient(circle at 80% 20%, var(--fundo) 0%, var(--fundo2) 70%, var(--fundo-escuro) 100%);
  position: relative;
  overflow: hidden;

  /* Flexbox para alinhar a imagem da frente exatamente no centro */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Camada de Ruído Grunge sobre o fundo */
.grunge-bg::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.18;
  mix-blend-mode: overlay;
  pointer-events: none;
  background-image: url("30.png");
}


#cartaz-container {
  position: relative;
  z-index: 2; /* Garante que fica na frente do ruído do fundo */
  max-width: 500px; /* Largura máxima do seu cartaz na tela */
  width: 90%;       /* Responsivo para celulares */
  

  transform: rotate(-2deg);
  
  /* Sombra pesada e "suja" (sem desfoque liso) */
  box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.8); 
  
  transition: transform 0.3s ease;
}

/* Efeito interativo ao passar o mouse (opcional, bem dinâmico) */
#cartaz-container:hover {
  transform: rotate(0deg) scale(1.02);
}

.imagem-frente {
  width: 100%;
  height: auto;
  display: block;
  border: 4px solid #fff; /* Borda branca simulando papel fotográfico/zine */
  filter: contrast(1.1);  /* Deixa a imagem da frente com mais contraste */
}
body{
