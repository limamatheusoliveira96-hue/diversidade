<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
<style>

/* =========================
   PALETA TRAVESTI
========================= */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Bebas+Neue&display=swap');

/* =========================
   PALETA
========================= */

:root{
    --rosa:#ff4fd8;
    --roxo:#7a2cff;
    --azul:#4dd6ff;
    --magenta:#ff2e88;

   
 

     --texto: #212529;    /* Preto suave */
    --texto2: #6c757d;   /* Cinza Bootstrap */
}

/* =========================
   BODY
========================= */



    font-family:'Cormorant Garamond', serif;

    overflow-x:hidden;
    padding-top:80px;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#0a0610;
}

::-webkit-scrollbar-thumb{
    background:var(--rosa);
    border-radius:20px;
}
.grunge-bg {
  width: 100vw;
  height: 100vh;
  /* Suas cores como variáveis */
  --fundo: #f5f0ff;
  --fundo2: #d9c8ff;
  
  /* Gradiente base desalinhado e dramático */
  background: radial-gradient(circle at 80% 20%, var(--fundo) 0%, var(--fundo2) 70%, #1a1525 100%);
  position: relative;
  overflow: hidden;
}

/* A mágica do Grunge: Camada de textura granulada */
.grunge-bg::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.15; /* Controla a intensidade da "sujeira" */
  mix-blend-mode: overlay; /* Mistura o ruído com o gradiente */
  pointer-events: none;
  
  /* Gerador de ruído SVG embutido */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
}
 /* NAVBAR */

        .navbar {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .navbar-toggler {
            border: none;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        /* OFFCANVAS */

        .offcanvas {
            background: #111;
        }

        .offcanvas-title {
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-link {
            color: white;
            font-size: 1.1rem;
            padding: 1rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link:hover {
            color: #aaa;
        }
   
   
   /* =========================
   HERO
========================= */

.hero{
    padding:120px 20px 80px;
    text-align:center;
}


.hero h1{
    font-family: 'Bodoni Moda', serif;
    font-size: 2rem;
    letter-spacing: 2px;
    margin-bottom: 15px;
}

    background:
    linear-gradient(
        90deg,
        var(--rosa),
        var(--azul),
        var(--roxo)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,79,216,.25);
}

.hero p{
    color:var(--texto2);

    font-size:1.4rem;

    letter-spacing:2px;

    max-width:700px;

    margin:auto;
}

/* =========================
   GALERIA
========================= */

.gallery{
    display:grid;

    grid-template-columns:repeat(6,1fr);

    grid-auto-rows:280px;

    gap:14px;

    padding:40px;
}

/* =========================
   ITENS
========================= */

.item{
    position:relative;

    overflow:hidden;

    border-radius:18px;

    cursor:pointer;

    background:#000;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

    transition:.5s ease;
}

.item:hover{
    transform:
    translateY(-5px)
    scale(1.01);
}

.item img{
    width:100%;
    height:100%;

    object-fit:cover;
    object-position:center;

    display:block;

    transition:.7s ease;
}

.item:hover img{
    transform:scale(1.08);
}

/* =========================
   CAMADA FOTOGRÁFICA
========================= */

.item::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        rgba(255,255,255,.04),
        rgba(0,0,0,.25)
    );

    z-index:2;

    pointer-events:none;
}

/* =========================
   OVERLAY
========================= */

.overlay{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,.92),
        transparent 65%
    );

    opacity:0;

    display:flex;

    align-items:flex-end;

    padding:20px;

    transition:.4s;

    z-index:3;
}

.item:hover .overlay{
    opacity:1;
}

.overlay{
    font-family:'Bebas Neue', sans-serif;

    letter-spacing:3px;

    font-size:1rem;

    color:white;
}

/* =========================
   TAMANHOS ASSIMÉTRICOS
========================= */

.big{
    grid-column:span 6;
    grid-row:span 6;
}

.medium{
    grid-column:span 2;
    grid-row:span 2;
}

.small{
    grid-column:span 1;
    grid-row:span 1;
}

.wide{
    grid-column:span 4;
    grid-row:span 2;
}

.tall{
    grid-column:span 2;
    grid-row:span 3;
}


/* =========================
   RESPONSIVO
========================= */

@media(max-width:992px){

    .hero h1{
        font-size:4rem;
        letter-spacing:6px;
    }

    .gallery{
        grid-template-columns:repeat(2,1fr);
        grid-auto-rows:220px;
    }

    .big,
    .wide,
    .tall,
    .medium{
        grid-column:span 2;
        grid-row:auto;
    }

    .menu{
        gap:15px;
    }
}

@media(max-width:600px){

    .museum-nav{
        flex-direction:column;
        gap:10px;
    }

    .hero{
        padding-top:160px;
    }

    .hero h1{
        font-size:3rem;
    }

    .hero p{
        font-size:1rem;
    }

    .gallery{
        padding:15px;
    }

   .modal-content{
    background:transparent;
}

#fotoGrande{
    max-height:90vh;
    width:auto;
    margin:auto;
    display:block;
    border-radius:10px;
}
   #bgimg
   {

      background-image: url("30.png");
   }
}</style>

   <script>

document.querySelectorAll('.item img').forEach(img => {

    img.addEventListener('click', () => {

        document.getElementById('fotoGrande').src = img.src;

        const modal = new bootstrap.Modal(
            document.getElementById('fotoModal')
        );

        modal.show();

    });

});
</script>
   <script>
document.querySelectorAll('.offcanvas .nav-link').forEach(link => {
    link.addEventListener('click', () => {
        const offcanvasElement = document.querySelector('.offcanvas.show');

        if (offcanvasElement) {
            const offcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
            offcanvas.hide();
        }
    });
});
</script>
